<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="12" fill="#0e0e0e"/>

  <!-- Border accent -->
  <rect width="64" height="64" rx="12" fill="none" stroke="#00ff9d" stroke-width="2" opacity="0.6"/>

  <!-- Bar chart bars (Codeforces style) -->
  <!-- Bar 1 -->
  <rect x="8"  y="38" width="10" height="18" rx="2" fill="#00ff9d" opacity="0.9"/>
  <!-- Bar 2 -->
  <rect x="22" y="24" width="10" height="32" rx="2" fill="#00ff9d"/>
  <!-- Bar 3 -->
  <rect x="36" y="14" width="10" height="42" rx="2" fill="#00ff9d"/>
  <!-- Bar 4 -->
  <rect x="46" y="30" width="10" height="26" rx="2" fill="#00ff9d" opacity="0.7"/>

  <!-- Glow dots on top of each bar -->
  <circle cx="13" cy="36" r="2.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="27" cy="22" r="2.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="41" cy="12" r="2.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="51" cy="28" r="2.5" fill="#ffffff" opacity="0.9"/>

  <!-- Bottom line -->
  <rect x="6" y="57" width="52" height="2" rx="1" fill="#00ff9d" opacity="0.4"/>
</svg>
